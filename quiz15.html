<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINAL QUIZ</title>
<style>
body {
  font-family: Arial;
  background:#111;
  color:#fff;
  text-align:center;
  transition:0.3s;
  margin:0;
  padding:0;
}

.light { background:#f5f5f5; color:#000; }

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

/* 📱 Mobile tối ưu */
@media (max-width: 600px) {
  h2 {
    font-size: 20px;
  }

  button {
    font-size: 18px;
    padding: 14px;
  }

  #timer {
    font-size: 42px;
  }

  #clock {
    width: 60px;
    height: 60px;
  }
}

button {
  display:block;
  width:100%;
  margin:10px 0;
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:18px;
  transition: all 0.25s ease;
}

button:hover {
  transform: translateY(-3px) scale(1.02);
}

button:active {
  transform: scale(0.96);
}

.correct { background:green; color:#fff; }
.wrong { background:red; color:#fff; }

.progress {
  height:10px;
  background:#333;
  border-radius:5px;
  overflow:hidden;
  margin:10px 0;
}

.progress-bar {
  height:100%;
  background:lime;
  width:0%;
}

/* 🔝 Thanh trên */
.top-bar {
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}

.top-bar button {
  flex:1;
  font-size:14px;
  padding:10px;
}

/* ⏱️ Timer mobile gọn lại */
#timerBox {
  position: fixed;
  top: 10px;
  right: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

#timer {
  font-size: 42px;
  font-weight: bold;
}

#clock {
  background: #222;
  border-radius: 50%;
}
</style>
</head>
<body>

<div class="container">
<div class="top-bar">
<button onclick="toggleMode()">🌙/☀️</button>
<button onclick="toggleTimer()" id="timerBtn">⏱️ TIMER ON</button>
</div>

<div id="timerBox">
  <canvas id="clock" width="80" height="80"></canvas>
  <p id="timer">10</p>
</div>

<h2 id="question"></h2>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div id="answers"></div>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let quiz = [
{q:"1 + 1 = ?", a:["1","2","3","4"], correct:1},
{q:"Thủ đô Việt Nam là gì?", a:["HCM","Đà Nẵng","Hà Nội","Huế"], correct:2},
{q:"5 x 5 = ?", a:["10","20","25","30"], correct:2}
];

// 🔥 RANDOM PRO MAX
function shuffleArray(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function randomize(){
quiz = shuffleArray([...quiz]); // đảo câu hỏi

quiz = quiz.map(q=>{
  let answers = shuffleArray([...q.a]); // đảo đáp án
  let correctIndex = answers.indexOf(q.a[q.correct]);

  return {
    q: q.q,
    a: answers,
    correct: correctIndex
  };
});
}

randomize();

// QUIZ
let current=0, score=0, time=10, timer;
let timerEnabled = true;

function loadQuestion(){
clearInterval(timer);
time=10;
if(timerEnabled) startTimer();
else document.getElementById("timer").innerText = "∞";

let q=quiz[current];
document.getElementById("question").innerText=q.q;
let box=document.getElementById("answers");
box.innerHTML="";

q.a.forEach((ans,i)=>{
let btn=document.createElement("button");
btn.innerText=ans;
btn.onclick=()=>checkAnswer(i,btn);
box.appendChild(btn);
});

updateBar();
}

function checkAnswer(i,btn){
clearInterval(timer);
let correct=quiz[current].correct;
let buttons=document.querySelectorAll("button:not(.top-bar button)");
buttons.forEach(b=>b.disabled=true);

if(i===correct){
  btn.classList.add("correct");
  score++;
  document.getElementById("correctSound").play();

  buttons.forEach((b,index)=>{
    if(index!==correct){
      setTimeout(()=>{
        b.classList.add("tear");
      }, Math.random()*200);
    }
  });

}else{
  btn.classList.add("wrong");
  buttons[correct].classList.add("correct");
  document.getElementById("wrongSound").play();
}

setTimeout(next,1200);
}

function next(){
current++;
if(current<quiz.length) loadQuestion();
else endQuiz();
}

function updateBar(){
document.getElementById("bar").style.width=(current/quiz.length)*100+"%";
}

// TIMER + CLOCK
function startTimer(){
const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");

function drawClock(){
  ctx.clearRect(0,0,80,80);

  ctx.beginPath();
  ctx.arc(40,40,35,0,Math.PI*2);
  ctx.strokeStyle="white";
  ctx.stroke();

  let angle = (time/10)*2*Math.PI - Math.PI/2;

  ctx.beginPath();
  ctx.moveTo(40,40);
  ctx.lineTo(
    40 + 30*Math.cos(angle),
    40 + 30*Math.sin(angle)
  );
  ctx.strokeStyle="red";
  ctx.lineWidth=3;
  ctx.stroke();
}

document.getElementById("timer").innerText=time;
drawClock();

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
drawClock();

if(time<=0){
clearInterval(timer);
next();
}
},1000);
}

function toggleMode(){
document.body.classList.toggle("light");
}

function endQuiz(){
let best = localStorage.getItem("best") || 0;
if(score>best){
best=score;
localStorage.setItem("best",best);
}

document.querySelector(".container").innerHTML=`
<h2>Hoàn thành!</h2>
<p>Điểm: ${score}/${quiz.length}</p>
<p>🏆 Cao nhất: ${best}</p>
<button onclick="location.reload()">Chơi lại</button>
`;
}
function toggleTimer(){
  timerEnabled = !timerEnabled;

  let btn = document.getElementById("timerBtn");

  if(timerEnabled){
    btn.innerText = "⏱️ TIMER ON";
    startTimer(); // chạy lại timer
  }else{
    btn.innerText = "📖 ÔN TẬP";
    clearInterval(timer); // dừng timer
    document.getElementById("timer").innerText = "∞";
  }
}

loadQuestion();
</script>
</body>
</html>
